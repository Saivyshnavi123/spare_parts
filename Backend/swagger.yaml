openapi: 3.0.0
info:
  title: Spare Parts Management API
  description: API for managing customers, products, orders, and payments for a spare parts store.
  version: 1.0.0

servers:
  - url: https://dpg-d77vcc7pm1nc73fk49ig-a.oregon-postgres.render.com
    description: Production Server

paths:
  /login:
    post:
      tags: [Authentication]
      summary: Authenticate user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email: {type: string, example: "admin@spare.com"}
                password: {type: string, example: "Admin@123"}
      responses:
        200:
          description: Login successful
        401:
          description: Invalid Credentials
        404:
          description: User not found

  /register:
    post:
      tags: [Authentication]
      summary: Register a new customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerInput'
      responses:
        201:
          description: Customer added successfully
        400:
          description: Email already exists

  /products:
    get:
      tags: [Products]
      summary: Get all products
      responses:
        200:
          description: List of products
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/Product'

  /products/{product_id}:
    get:
      tags: [Products]
      summary: Get product details by ID
      parameters:
        - name: product_id
          in: path
          required: true
          schema: {type: integer}
      responses:
        200:
          description: Product details
        404:
          description: Product not found

  /customers:
    get:
      tags: [Customers]
      summary: Get all customers
      responses:
        200:
          description: List of customers

  /customers/{customer_id}:
    get:
      tags: [Customers]
      summary: Get customer by ID
      parameters:
        - name: customer_id
          in: path
          required: true
          schema: {type: integer}
      responses:
        200:
          description: Customer details
    post:
      tags: [Customers]
      summary: Update customer details
      parameters:
        - name: customer_id
          in: path
          required: true
          schema: {type: integer}
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerInput'
      responses:
        200:
          description: Customer updated successfully

  /customers/{customer_id}/orders:
    get:
      tags: [Customers]
      summary: Get orders for a specific customer
      parameters:
        - name: customer_id
          in: path
          required: true
          schema: {type: integer}
      responses:
        200:
          description: List of customer orders

  /orders:
    post:
      tags: [Orders]
      summary: Create a new order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                customer_id: {type: integer}
                payment_method: {type: string}
                items:
                  type: array
                  items:
                    type: object
                    properties:
                      product_id: {type: integer}
                      quantity: {type: integer}
      responses:
        201:
          description: Order created successfully

  /orders/{order_id}:
    put:
      tags: [Orders]
      summary: Update order status
      parameters:
        - name: order_id
          in: path
          required: true
          schema: {type: integer}
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                status: {type: string, example: "Shipped"}
      responses:
        200:
          description: Order status updated

  /orders/{order_id}/payment:
    post:
      tags: [Orders]
      summary: Process payment for an order
      parameters:
        - name: order_id
          in: path
          required: true
          schema: {type: integer}
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                amount: {type: number}
                payment_method: {type: string}
      responses:
        200:
          description: Payment processed successfully

components:
  schemas:
    CustomerInput:
      type: object
      required: [email, password]
      properties:
        first_name: {type: string}
        last_name: {type: string}
        email: {type: string}
        password: {type: string}
        phone: {type: string}
        address_line1: {type: string}
        address_line2: {type: string}
        city: {type: string}
        state: {type: string}
        zip_code: {type: string}
        country: {type: string}

    Product:
      type: object
      properties:
        product_id: {type: integer}
        name: {type: string}
        description: {type: string}
        amount: {type: number}
        stock_quantity: {type: integer}